# Ananta Meridian — Degraded Sensor Fusion Configuration
# Tune these parameters for your specific sensor platform and environment.
# All thresholds reflect operationally validated defaults for degraded Arctic/maritime sensing.

system:
  name: "Ananta Meridian Data Fusion"
  version: "0.2.0"
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  log_to_file: true
  log_file: "logs/fusion.log"

fusion:
  detection_threshold: 0.6   # weighted_score >= this → fused_detection = True
  disagreement_penalty: 0.8  # legacy flat penalty multiplier when sensors contradict (used unless weighted_disagreement.enabled)

  # ── Continuous freshness decay (DEFAULT: on) ──
  # Replaces the bracket step-function with a smooth exponential decay.
  # Physically realistic and auditable — no arbitrary bracket boundaries.
  #
  # To revert to legacy bracket mode: set freshness_continuous: false
  #
  # Environment presets (uncomment one block):
  #
  # Marine / satellite comms (800–2000 ms latency is normal, not degraded):
  freshness_continuous:
    model: exponential
    tau_ms: 500          # at 500ms latency freshness = 0.37; at 1500ms ≈ 0.05
    floor: 0.05
  #
  # Drone / Arctic terrestrial (low-latency environment):
  # freshness_continuous:
  #   model: exponential
  #   tau_ms: 200        # at 200ms freshness = 0.37; tighter than marine
  #   floor: 0.05
  #
  # Sigmoid (sharp knee — use when latency is stable then suddenly degrades):
  # freshness_continuous:
  #   model: sigmoid
  #   t0_ms: 800         # knee latency for marine; use 300 for terrestrial
  #   k_ms: 150
  #   floor: 0.05

  # ── Weighted disagreement penalty (opt-in) ──
  # When enabled, replaces the flat 0.8 multiplier with an entropy-based
  # penalty that scales smoothly with how much sensors disagree and how
  # much weight each disagreeing sensor carries. alpha controls strength.
  # weighted_disagreement:
  #   enabled: true
  #   alpha: 0.4         # 0 disables; 0.4 ≈ legacy 0.8 at maximum disagreement

  # ── Adversarial sensor detection (opt-in) ──
  # Residual-based outlier check: flags and down-weights any single sensor
  # that strongly disagrees with the consensus of all others while claiming
  # high reported quality. Mitigates the spoofing weakness called out in the
  # README. Requires at least 3 sensors to activate.
  # adversarial_detection:
  #   enabled: true
  #   suspect_threshold: 0.7  # how strong the opposing consensus must be (0..1)
  #   quality_floor: 0.6      # min reported quality for a sensor to be flagged

  # ── Kalman filter baseline parameters (opt-in) ──
  # Used when fusion method = kalman_filter. Provides a credible defence-grade
  # benchmark vs. confidence_weighted fusion (rather than only toy baselines).
  # kalman:
  #   process_variance: 0.05
  #   sensor_variance_floor: 0.02
  #   variance_scale: 0.5
  #   threshold: 0.5
  #   decay: 1.0           # 1.0 = persistent target; <1.0 = mean-reverting

  # Freshness brackets: how latency maps to a trust weight (legacy bracketed mode).
  # Increase max_latency_ms values for high-latency environments (e.g. satellite comms).
  freshness_brackets:
    - max_latency_ms: 100
      factor: 1.0
    - max_latency_ms: 200
      factor: 0.9
    - max_latency_ms: 300
      factor: 0.75
    - max_latency_ms: 400
      factor: 0.55
    - max_latency_ms: 600
      factor: 0.35
    - max_latency_ms: 99999
      factor: 0.2

  # Reliability factor bounds based on historical average quality*freshness.
  reliability_bands:
    - min_avg: 0.8
      factor: 1.0
    - min_avg: 0.6
      factor: 0.9
    - min_avg: 0.4
      factor: 0.75
    - min_avg: 0.0
      factor: 0.6

confidence:
  # Thresholds tuned for marine/satellite environment (800–2000ms normal latency).
  # For drone/terrestrial, reduce max_latency_ms values (200 / 450 respectively).
  thresholds:
    high:
      min_score: 0.8
      min_quality: 0.8
      max_latency_ms: 1000       # marine: satellite comms up to 1s is normal
      allow_disagreement: false
    medium:
      min_score: 0.5
      min_quality: 0.55
      max_latency_ms: 2000       # marine: mesh radio bursts up to 2s acceptable
  sensor_flags:
    low_quality_threshold: 0.5    # below this quality → flagged in reasons
    high_latency_threshold: 1500  # marine: flag only genuinely excessive latency

experiment:
  results_dir: "results"
  save_results: true

# Sensor source configuration — used by adapters.
# Set source to: simulation | csv | noaa | openweather
sensors:
  source: "simulation"
  expected_sensors:
    - "A"
    - "B"
    - "C"

  # NOAA adapter config (used when source = noaa)
  noaa:
    station_id: "GHCND:USW00094728"  # San Francisco International Airport (testing)
    dataset: "GHCND"
    token: ""                    # set via NOAA_TOKEN env var or here
    lookback_days: 30

  # OpenWeather adapter config (used when source = openweather)
  openweather:
    api_key: ""                  # set via OPENWEATHER_API_KEY env var or here
    lat: 68.3                    # default: Arctic Norway
    lon: 18.9
    units: "metric"

  # NWS adapter config (used when source = nws)
  # National Weather Service — no API key required
  # Default: four Arctic Alaska stations (Barrow, Nome, Fairbanks, Cold Bay)
  nws:
    stations:   # leave empty to use defaults, or override with custom list
      - {id: "PABR", name: "Barrow_AK",    lat: 71.29, lon: -156.79}
      - {id: "PAOM", name: "Nome_AK",      lat: 64.51, lon: -165.43}
      - {id: "PAFA", name: "Fairbanks_AK", lat: 64.80, lon: -147.86}
      - {id: "PACD", name: "ColdBay_AK",   lat: 55.20, lon: -162.72}

  # CSV adapter config (used when source = csv)
  csv:
    file_path: "data/sensor_readings.csv"
    sensor_col: "sensor_id"
    detected_col: "detected"
    quality_col: "quality"
    latency_col: "latency_ms"

  # OpenAQ adapter config (used when source = openaq)
  # No authentication required — free API
  openaq:
    countries: ["US", "CA", "NO"]  # Countries to fetch air quality data from
    limit: 10                        # Max stations per country

  # USGS adapter config (used when source = usgs)
  # No authentication required — free API
  usgs:
    min_magnitude: 4.0              # Minimum earthquake magnitude to include
    time_range_hours: 720           # 30 days of data to find significant events
