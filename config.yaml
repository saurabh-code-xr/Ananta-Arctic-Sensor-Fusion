# Ananta Meridian — Degraded Sensor Fusion Configuration
# Tune these parameters for your specific sensor platform and environment.
# All thresholds reflect operationally validated defaults for degraded Arctic/maritime sensing.

system:
  name: "Ananta Meridian Data Fusion"
  version: "0.2.0"
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  log_to_file: true
  log_file: "logs/fusion.log"

fusion:
  detection_threshold: 0.6   # weighted_score >= this → fused_detection = True
  disagreement_penalty: 0.8  # score multiplier when sensors contradict each other

  # Freshness brackets: how latency maps to a trust weight.
  # Increase max_latency_ms values for high-latency environments (e.g. satellite comms).
  freshness_brackets:
    - max_latency_ms: 100
      factor: 1.0
    - max_latency_ms: 200
      factor: 0.9
    - max_latency_ms: 300
      factor: 0.75
    - max_latency_ms: 400
      factor: 0.55
    - max_latency_ms: 600
      factor: 0.35
    - max_latency_ms: 99999
      factor: 0.2

  # Reliability factor bounds based on historical average quality*freshness.
  reliability_bands:
    - min_avg: 0.8
      factor: 1.0
    - min_avg: 0.6
      factor: 0.9
    - min_avg: 0.4
      factor: 0.75
    - min_avg: 0.0
      factor: 0.6

confidence:
  thresholds:
    high:
      min_score: 0.8
      min_quality: 0.8
      max_latency_ms: 200
      allow_disagreement: false
    medium:
      min_score: 0.5
      min_quality: 0.55
      max_latency_ms: 450
  sensor_flags:
    low_quality_threshold: 0.5    # below this quality → flagged in reasons
    high_latency_threshold: 400   # above this latency → flagged in reasons

experiment:
  results_dir: "results"
  save_results: true

# Sensor source configuration — used by adapters.
# Set source to: simulation | csv | noaa | openweather
sensors:
  source: "simulation"
  expected_sensors:
    - "A"
    - "B"
    - "C"

  # NOAA adapter config (used when source = noaa)
  noaa:
    station_id: "GHCND:USW00027503"  # Barrow, Alaska — northernmost US weather station
    dataset: "GHCND"
    token: ""                    # set via NOAA_TOKEN env var or here
    lookback_days: 30

  # OpenWeather adapter config (used when source = openweather)
  openweather:
    api_key: ""                  # set via OPENWEATHER_API_KEY env var or here
    lat: 68.3                    # default: Arctic Norway
    lon: 18.9
    units: "metric"

  # CSV adapter config (used when source = csv)
  csv:
    file_path: "data/sensor_readings.csv"
    sensor_col: "sensor_id"
    detected_col: "detected"
    quality_col: "quality"
    latency_col: "latency_ms"

  # OpenAQ adapter config (used when source = openaq)
  # No authentication required — free API
  openaq:
    countries: ["US", "CA", "NO"]  # Countries to fetch air quality data from
    limit: 10                        # Max stations per country

  # USGS adapter config (used when source = usgs)
  # No authentication required — free API
  usgs:
    min_magnitude: 4.0              # Minimum earthquake magnitude to include
    time_range_hours: 720           # 30 days of data to find significant events
